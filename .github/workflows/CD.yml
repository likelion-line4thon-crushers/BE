name: CD with Gradle
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Gradle Wrapper
        run: |
          chmod 544 ./gradlew
          echo "tasks.named('bootJar') { mainClass.set('line4thon.boini.BoiniApplication') }" >> build.gradle
          ./gradlew clean build -x test --info

      - name: Transfer Build File using SCP
        uses: appleboy/scp-action@master
        with:
          username: ubuntu
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ubuntu/Boini/"

      - name: docker compose up spring only # [수정] 전체 대신 spring만 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Boini
            docker compose up -d --build spring # [수정] spring 서비스만 재시작
            docker image prune -f
